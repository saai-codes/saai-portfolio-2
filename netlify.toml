[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"

[context.production.environment]
  REACT_APP_ENV = "production"

[cache]
  [cache.cacheDirectory]
    command = "npm ci --prefer-offline --no-audit"
    paths = ["node_modules"]
